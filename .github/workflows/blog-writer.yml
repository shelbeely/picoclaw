# Blog Writer — GitHub Actions matrix workflow
#
# Runs one PicoClaw AI agent per topic in parallel (GitHub Actions matrix
# strategy) and publishes each generated Jekyll post to docs/_posts/.
#
# ┌─────────────────────────────────────────────────────────────────────┐
# │ Required secret                                                     │
# │   OPENROUTER_API_KEY  — your OpenRouter key (preferred)            │
# │   AI_API_KEY          — fallback for non-OpenRouter providers      │
# │                                                                     │
# │ Optional repository variable                                        │
# │   AI_MODEL  — e.g. openrouter/meta-llama/llama-3.1-8b-instruct:free│
# └─────────────────────────────────────────────────────────────────────┘
#
# Rate-limit handling (OpenRouter free tier):
#   • Free models (:free suffix) → max-parallel: 1, 3 s delay per call
#     This keeps throughput safely under 20 req/min and conserves the
#     50–1 000 daily request budget.
#   • Paid models               → max-parallel: 6, no forced delay.
#
# Set free_tier: true in workflow_dispatch (or always-on for schedule) to
# activate conservative rate limiting automatically.

name: Blog Writer

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday 09:00 UTC

  workflow_dispatch:
    inputs:
      topics:
        description: >
          JSON array of blog topics. Each entry becomes one parallel matrix job.
          Example: ["AI ethics","Rust vs Go","Open source 2025"]
        required: false
        default: ''
      model:
        description: >
          Model in "provider/model-id" format.
          Leave blank to use the AI_MODEL variable.
          Free-tier example: openrouter/meta-llama/llama-3.1-8b-instruct:free
        required: false
        default: ''
      free_tier:
        description: >
          Set true when using an OpenRouter :free model.
          Limits parallel jobs to 1 and adds a 3 s delay to respect
          the 20 req/min and 50–1 000 req/day free-tier caps.
        required: false
        default: 'false'

concurrency:
  group: blog-writer
  cancel-in-progress: true

jobs:
  # ── 0. Resolve matrix + rate-limit parameters ────────────────────────────
  set-matrix:
    name: Set matrix and rate limits
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      topics:       ${{ steps.resolve.outputs.topics }}
      model:        ${{ steps.resolve.outputs.model }}
      max_parallel: ${{ steps.resolve.outputs.max_parallel }}
      delay:        ${{ steps.resolve.outputs.delay }}
    steps:
      - name: Resolve inputs
        id: resolve
        env:
          INPUT_TOPICS:    ${{ inputs.topics }}
          INPUT_MODEL:     ${{ inputs.model }}
          INPUT_FREE_TIER: ${{ inputs.free_tier }}
          VAR_MODEL:       ${{ vars.AI_MODEL }}
        run: |
          # ── topics ──────────────────────────────────────────────────────
          DEFAULT_TOPICS='["The future of AI agents","Open source tools every developer should know","Writing clean code: lessons from the trenches"]'
          if [ -n "$INPUT_TOPICS" ]; then
            echo "topics=$INPUT_TOPICS" >> "$GITHUB_OUTPUT"
          else
            echo "topics=$DEFAULT_TOPICS" >> "$GITHUB_OUTPUT"
          fi

          # ── model ───────────────────────────────────────────────────────
          RESOLVED_MODEL="${INPUT_MODEL:-${VAR_MODEL:-openrouter/meta-llama/llama-3.1-8b-instruct:free}}"
          echo "model=$RESOLVED_MODEL" >> "$GITHUB_OUTPUT"

          # ── rate-limit parameters ────────────────────────────────────────
          # Auto-detect free tier if free_tier input is not explicitly set
          IS_FREE="$INPUT_FREE_TIER"
          if [ "$IS_FREE" != "true" ] && [[ "$RESOLVED_MODEL" == *":free"* ]]; then
            IS_FREE="true"
            echo "::notice::Free-tier model detected — enabling conservative rate limiting."
          fi

          if [ "$IS_FREE" = "true" ]; then
            # Serial execution (max-parallel=1) + 3 s delay stays well inside
            # the 20 req/min cap and preserves the daily request budget.
            echo "max_parallel=1" >> "$GITHUB_OUTPUT"
            echo "delay=3"        >> "$GITHUB_OUTPUT"
          else
            echo "max_parallel=6" >> "$GITHUB_OUTPUT"
            echo "delay=0"        >> "$GITHUB_OUTPUT"
          fi

  # ── 1. Generate posts (matrix — one picoclaw per topic) ──────────────────
  generate:
    name: Write — "${{ matrix.topic }}"
    needs: set-matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      # max-parallel is set by set-matrix:
      #   free tier  → 1  (serial; safe within 20 req/min)
      #   paid tier  → 6  (parallel; no forced throttle)
      max-parallel: ${{ fromJson(needs.set-matrix.outputs.max_parallel) }}
      matrix:
        topic: ${{ fromJson(needs.set-matrix.outputs.topics) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute slug
        id: slug
        env:
          TOPIC: ${{ matrix.topic }}
        run: |
          SLUG=$(printf '%s' "$TOPIC" \
            | tr '[:upper:]' '[:lower:]' \
            | tr ' /' '--' \
            | sed 's/[^a-z0-9-]//g' \
            | sed 's/--*/-/g;s/^-//;s/-$//')
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      - name: Write blog post (picoclaw)
        id: agent
        uses: ./
        with:
          message: |
            You are writing a blog post for an AI agent persona's GitHub Pages blog.

            Topic: ${{ matrix.topic }}

            Return ONLY the complete Jekyll post. Use this exact format:

            ---
            layout: post
            title: "Your Engaging Title Here"
            date: YYYY-MM-DD HH:MM:SS +0000
            categories: [category1, category2]
            tags: [tag1, tag2, tag3]
            excerpt: "One-sentence summary shown on the blog index."
            ---

            ## Introduction

            ...body in Markdown (600–1 200 words)...

            Replace YYYY-MM-DD HH:MM:SS +0000 with today's UTC date/time.
            Do NOT include any text before the opening "---".
          model:            ${{ needs.set-matrix.outputs.model }}
          api_key:          ${{ secrets.OPENROUTER_API_KEY || secrets.AI_API_KEY }}
          workspace_dir:    ${{ github.workspace }}/workspace
          session:          blog-${{ steps.slug.outputs.slug }}
          rate_limit_delay: ${{ needs.set-matrix.outputs.delay }}

      - name: Save post artifact
        env:
          POST_CONTENT: ${{ steps.agent.outputs.response }}
          SLUG:         ${{ steps.slug.outputs.slug }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          mkdir -p "$RUNNER_TEMP/posts"
          printf '%s\n' "$POST_CONTENT" > "$RUNNER_TEMP/posts/${DATE}-${SLUG}.md"
          echo "Saved: ${DATE}-${SLUG}.md"

      - name: Upload post artifact
        uses: actions/upload-artifact@v4
        with:
          name: post-${{ steps.slug.outputs.slug }}
          path: ${{ runner.temp }}/posts/*.md
          if-no-files-found: error

  # ── 2. Commit all posts at once (avoids concurrent git-push conflicts) ────
  commit:
    name: Commit posts
    needs: generate
    if: always() && needs.generate.result != 'skipped'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all post artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: post-*
          path: ${{ runner.temp }}/all-posts
          merge-multiple: true

      - name: Copy posts into docs/_posts
        run: |
          mkdir -p docs/_posts
          find "$RUNNER_TEMP/all-posts" -name "*.md" -exec cp {} docs/_posts/ \;
          ls -1 docs/_posts/

      - name: Commit and push
        run: |
          git config user.name  "picoclaw-blog-bot"
          git config user.email "picoclaw-blog-bot@users.noreply.github.com"
          git add docs/_posts/
          if git diff --staged --quiet; then
            echo "Nothing new to commit."
          else
            git commit -m "📝 Blog posts [$(date -u +%Y-%m-%d)] [skip ci]"
            git push
          fi
