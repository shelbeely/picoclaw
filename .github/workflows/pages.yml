# GitHub Pages — deploy docs/ to Pages
#
# Automatically deploys the docs/ directory to GitHub Pages whenever
# a push lands on main (including the blog-writer's post commits).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'

  # Allow manual deployment
  workflow_dispatch:

# Sets permissions needed by actions/deploy-pages
permissions:
  contents: read
  pages:    write
  id-token: write

# Only one deployment at a time; don't cancel in-progress so we don't
# leave Pages in a half-deployed state.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Jekyll site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
